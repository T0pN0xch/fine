name: budget_app
description: A personal budgeting app inspired by Money+
publish_to: "none"
version: 1.0.2+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Local Database
  drift: ^2.17.0
  drift_flutter: ^0.2.0 # cross-platform connection (native + web wasm)
  sqlite3_flutter_libs: ^0.5.0
  sqlite3: any
  path_provider: ^2.1.2
  path: ^1.9.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Charts
  fl_chart: ^0.68.0

  # Notifications (recurring bills)
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # UI Utilities
  intl: ^0.19.0 # Date & currency formatting
  google_fonts: ^6.2.1 # Typography
  flutter_svg: ^2.0.10 # SVG icons
  iconsax_flutter: ^1.0.0 # Icon pack (similar to Money+ icons)
  gap: ^3.0.1 # Spacing utility
  animated_bottom_navigation_bar: ^1.3.3

  # Security
  local_auth: ^2.2.0 # Biometric / PIN lock
  flutter_secure_storage: ^9.0.0

  # Data & Backup
  uuid: ^4.4.0
  csv: ^6.0.0
  share_plus: ^10.0.2

  # App metadata
  package_info_plus: ^8.0.0

  # Home screen widget
  home_widget: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.17.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#7A6FE0"
  adaptive_icon_foreground: "assets/icons/app_logo.png"
